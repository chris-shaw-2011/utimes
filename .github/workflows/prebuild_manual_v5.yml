# This workflow is used to manually build artifacts
# It requires the new binary configuration in v5.0.0+
# For older versions, use the prebuild_manual_v4 workflow

name: prebuild_manual_v5

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version (ie 5.0.0)'
      ref:
        description: 'Checkout ref (tag or SHA)'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
            extra-arch: ia32
          - os: windows-latest
            node-version: 22
            extra-arch: ia32
          - os: macos-latest
            node-version: 22
            extra-arch: ''

    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Install gcc-multilib
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install g++-multilib -y

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version --allow-same-version version "${{ github.event.inputs.version }}"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build host artifact
        run: npm run build

      - name: Build additional artifact
        if: matrix.extra-arch != ''
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts['build:native'] ? 0 : 1)"; then
            npm run build:native -- --target_arch="${{ matrix.extra-arch }}"
          else
            npm run build -- --target_arch="${{ matrix.extra-arch }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.event.inputs.version }}
          path: packages/utimes*.tar.gz

  build-arm:
    strategy:
      matrix:
        arch: [aarch64, armv7]
        distro: [ubuntu22.04]

    name: build ${{ matrix.distro }}:${{ matrix.arch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version --allow-same-version version "${{ github.event.inputs.version }}"

      - name: Build artifact (${{ matrix.arch }})
        uses: uraimo/run-on-arch-action@v2.1.1
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            apt-get update -y
            apt-get install -y curl
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y make g++ python nodejs
          run: |
            cd /repo
            npm ci --ignore-scripts
            npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.event.inputs.version }}
          path: packages/utimes*.tar.gz
