# This workflow is used to manually build artifacts
# It requires the new binary configuration in v5.0.0+
# For older versions, use the prebuild_manual_v4 workflow

name: prebuild_manual_v5

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version (ie 5.0.0)'
      ref:
        description: 'Checkout ref (tag or SHA)'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            node-version: 24
            extra-arch: ia32
          - os: windows-2022
            node-version: 24
            extra-arch: ia32
          - os: macos-15-intel
            node-version: 24
            extra-arch: ''

    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Install gcc-multilib
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt update
          sudo apt install g++-multilib -y

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version --allow-same-version version "${{ github.event.inputs.version }}"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build host artifact
        run: npm run build

      - name: Build additional artifact
        if: matrix.extra-arch != ''
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts['build:native'] ? 0 : 1)"; then
            npm run build:native -- --target_arch="${{ matrix.extra-arch }}"
          else
            npm run build -- --target_arch="${{ matrix.extra-arch }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ github.event.inputs.version }}
          path: packages/utimes*.tar.gz

  build-arm:
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7]
        distro: [ubuntu24.04]

    name: build ${{ matrix.distro }}:${{ matrix.arch }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version --allow-same-version version "${{ github.event.inputs.version }}"

      - name: Build artifact (${{ matrix.arch }})
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            apt-get update -y
            apt-get install -y curl make g++ python3
            export NVM_DIR=/root/.nvm
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            . "$NVM_DIR/nvm.sh"
            nvm install --lts
            nvm alias default 'lts/*'
          run: |
            cd /repo
            set +u
            export NVM_DIR=/root/.nvm
            . "$NVM_DIR/nvm.sh"
            nvm use --lts
            set -u
            npm ci --ignore-scripts
            npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ github.event.inputs.version }}
          path: packages/utimes*.tar.gz
