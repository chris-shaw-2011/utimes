name: publish

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            extra-arch: ia32
          - os: windows-2022
            extra-arch: ia32
          - os: macos-15-intel
            extra-arch: ''

    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install gcc-multilib
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt update
          sudo apt install g++-multilib -y

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version version "${GITHUB_REF_NAME#v}"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build host artifact
        run: npm run build

      - name: Run tests
        run: npm run test -- --runInBand

      - name: Build additional artifact
        if: matrix.extra-arch != ''
        run: npm run build:native -- --target_arch=${{ matrix.extra-arch }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" packages/utimes*.tar.gz --clobber

  build-arm:
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7]
        distro: [ubuntu24.04]

    name: build ${{ matrix.distro }}:${{ matrix.arch }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version version "${GITHUB_REF_NAME#v}"

      - name: Build artifact (${{ matrix.arch }})
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/repo"
          install: |
            apt-get update -y
            apt-get install -y curl make g++ python3
            export NVM_DIR=/root/.nvm
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            . "$NVM_DIR/nvm.sh"
            nvm install --lts
            nvm alias default 'lts/*'
          run: |
            cd /repo
            export NVM_DIR=/root/.nvm
            . "$NVM_DIR/nvm.sh"
            nvm use --lts
            npm ci --ignore-scripts
            npm run build
            npm run test -- --runInBand

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" packages/utimes*.tar.gz --clobber

  publish:
    needs: [build, build-arm]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@chris-shaw-2011'

      - name: Set package version
        shell: bash
        run: npm --no-git-tag-version version "${GITHUB_REF_NAME#v}"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run checks
        run: npm run check

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
